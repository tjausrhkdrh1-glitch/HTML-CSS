<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>input 태그연습</title>
</head>

<body>
    <form name="loginForm" action="login.php" method="post">
        <input type="text" title="아이디" name="userid" />
        <input type="password" title="비밀번호" name="userid" />
        <input type="submit" value="로그인" />
        </from>

        <from name="joinform" action="join.php" method="post">
            <p>이름</p>
            <input type="text" title="이름" name="userid">
            <p>이메일</p>
            <input type="email" title="이메일" name="userid">
            <p>아이디</p>
            <input type="text" title="아이디" name="userid">
            <p>비밀번호</p>
            <input type="password" title="비밀번호" name="userid">

            <hr>
            <p>성별선택</p>
            <input type="radio" name="gonder" value="man" title="성별 : 남" />남
            <input type="radio" name="gonder" value="woman" title="성별 : 여" />여
            <p>취미선택</p>
            <input type="checkbox" name="게임" title="게임" />게임
            <input type="checkbox" name="음악" title="음악" />음악
            <input type="checkbox" name="영화" title="영화" />영화
            <p>약관동의</p>
            <input type="checkbox" name="information" title="개인정보수정" />개인정보 수집에 동의

            <hr>
            <p>생년월일</p>
            <input type="date" name="birth" title="생년월일" />
            <p>프로필 사진 업로드</p>
            <input type="file" name="profileimg" title="프로필 사진 업로드" />
            <p>좋아하는 색상</p>
            <input type="color" name="likecolor" title="좋아하는 색상" />

        </from>

        <from name="일단패스" action="일단패스" method="일단패스">
            <p>나이</p>
            <input type="number" title="나이" name="userid">
            <p>음량조절</p>
            <input type="range" name="volume" title="볼륨조절">
        </from>


</body>

</html>
